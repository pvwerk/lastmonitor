<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Küchen-Lastmonitor</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="display">
  <!-- Farbiger Rand-Ring rund um den Bildschirm -->
  <div id="ring" class="ring"></div>

  <main id="main" class="layout level-offline">

    <!-- LINKE HÄLFTE: Netzbezug -->
    <section class="netz">
      <div class="block-title" id="title">Netzbezug</div>
      <div class="gauge-wrap">
        <svg viewBox="0 0 200 120" class="gauge" preserveAspectRatio="xMidYMid meet">
          <path class="gauge-bg" d="M10 110 A 90 90 0 0 1 190 110" />
          <path id="gaugeFill" class="gauge-fill" d="M10 110 A 90 90 0 0 1 190 110" />
          <line id="needle" class="needle" x1="100" y1="110" x2="100" y2="48" />
          <circle cx="100" cy="110" r="6" class="needle-hub" />
        </svg>
        <div class="gauge-center">
          <div class="power" id="power">–</div>
          <div class="power-unit">kW</div>
        </div>
      </div>
      <div class="pct-row">
        <span id="pct" class="pct">– %</span>
        <span class="pct-label">der Anschlussleistung (<span id="maxkw">–</span> kW)</span>
      </div>
      <!-- Gesamtverbrauch + Richtungsstatus -->
      <div class="totalbox">
        <div class="total-line">
          <span class="total-label">Gesamtverbrauch</span>
          <span class="total-val" id="total">– kW</span>
        </div>
        <div class="dir" id="dir"><span class="dot"></span><span id="dirText">–</span></div>
      </div>
      <div class="status" id="status">Verbinde …</div>
    </section>

    <!-- RECHTS OBEN: Erzeugung -->
    <section class="erzeugung">
      <div class="block-title">Erzeugung (PV)</div>
      <div class="big-metric">
        <span class="big-val" id="prod">–</span><span class="big-unit">kW</span>
      </div>
    </section>

    <!-- RECHTS UNTEN: Energie (Tag, Woche, Monat) -->
    <section class="energy">
      <div class="block-title">Energie</div>
      <div class="energy-today">
        <div class="etile ertrag">
          <div class="et-label">Tagesertrag</div>
          <div class="et-val" id="dayErtrag">– kWh</div>
        </div>
        <div class="etile verbrauch">
          <div class="et-label">Tagesverbrauch</div>
          <div class="et-val" id="dayVerbrauch">– kWh</div>
        </div>
      </div>
      <div class="energy-periods">
        <div class="ep">
          <div class="ep-title">Woche</div>
          <div class="ep-row"><span>Ertrag</span><b id="weekErtrag">–</b></div>
          <div class="ep-row"><span>Verbrauch</span><b id="weekVerbrauch">–</b></div>
        </div>
        <div class="ep">
          <div class="ep-title">Monat</div>
          <div class="ep-row"><span>Ertrag</span><b id="monthErtrag">–</b></div>
          <div class="ep-row"><span>Verbrauch</span><b id="monthVerbrauch">–</b></div>
        </div>
      </div>
      <!-- optionale Zusatz-Zähler (falls konfiguriert) -->
      <div class="meter-list" id="meterList"></div>
    </section>
  </main>

  <!-- Logo-Fußleiste -->
  <footer class="brandbar">
    <span class="brand sampl"><img src="/static/sampl-logo.png" alt="Sampl Partyservice" /></span>
    <span class="brand pvwerk"><img src="/static/pvwerk-logo.png" alt="PHOTOVOLTAIK WERK" /></span>
  </footer>

  <!-- Vollflächige Warnung bei kritischem Pegel -->
  <div id="overlay" class="overlay hidden">
    <div class="overlay-text" id="overlayText">STROM REDUZIEREN!</div>
    <div class="overlay-sub" id="overlaySub">Netzanschluss fast ausgelastet</div>
  </div>

  <!-- Standby-Zeitfenster: dunkelt den Bildschirm komplett ab (kein Licht in der Küche) -->
  <div id="standbyOverlay" class="standby-overlay hidden"></div>

  <script src="/static/display.js"></script>
</body>
</html>
